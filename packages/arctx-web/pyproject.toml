[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "arctx-web"
version = "0.3.0b2"
description = "Web GUI for ARCTX — read/write DAG editing in the browser"
readme = "README.md"
requires-python = ">=3.10"
license = {text = "MIT"}
authors = [
    {name = "Takumi Ishida"},
]
keywords = ["gui", "web", "arctx", "dag", "agents", "developer-tools"]
classifiers = [
    "Development Status :: 4 - Beta",
    "Intended Audience :: Developers",
    "License :: OSI Approved :: MIT License",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Topic :: Software Development :: Libraries :: Python Modules",
    "Topic :: Utilities",
]
# Reuses the serve dispatcher and run-resolution helpers from arctx-cli, so the
# HTTP API contract has a single source of truth.
dependencies = [
    "arctx>=0.3.0b2",
    "arctx-cli>=0.3.0b2",
]

[project.optional-dependencies]
dev = [
    "pytest>=7.0",
    "black>=23.0",
    "ruff>=0.1.0",
    "mypy>=1.0",
]

[project.scripts]
arctx-web = "arctx_web.main:main"

[project.urls]
Homepage = "https://github.com/takumiecd/arctx"
Repository = "https://github.com/takumiecd/arctx"

[tool.hatch.build.targets.wheel]
packages = ["src/arctx_web"]
# The built frontend is copied into src/arctx_web/static/ before packaging
# (see `python -m arctx_web.bundle`). Force-include it so wheels are
# self-contained even though it is git-ignored.
artifacts = ["src/arctx_web/static/**"]

[tool.pytest.ini_options]
testpaths = ["tests"]
pythonpath = ["src"]

[tool.black]
line-length = 100
target-version = ["py310"]

[tool.ruff]
line-length = 100
select = ["E", "F", "W", "I", "N", "D", "UP", "B", "C4", "SIM"]
ignore = ["D100", "D104", "D203", "D213"]

[tool.mypy]
python_version = "3.10"
warn_return_any = true
warn_unused_configs = true
disallow_untyped_defs = true
